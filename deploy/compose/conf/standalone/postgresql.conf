# Postgres Control Tower demo — standalone PG config.
#
# Tuned for a small demo (200MB shared_buffers etc.). The two
# non-default things that matter for PCT:
#   - logging_collector + log_line_prefix '%t [%p]: '   (matches parsers.py)
#   - archive_mode + archive_command via pgbackrest

# ---------- connections ----------
listen_addresses = '*'
port = 5432
max_connections = 50

# ---------- memory (small demo) ----------
shared_buffers = 256MB
work_mem       = 8MB
maintenance_work_mem = 64MB

# ---------- timezone ----------
timezone     = 'UTC'
log_timezone = 'UTC'

# ---------- logging ----------
log_destination     = 'stderr'
logging_collector   = on
log_directory       = '/var/log/postgresql'
log_filename        = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode       = 0640
log_rotation_age    = 1d
log_rotation_size   = 100MB
log_truncate_on_rotation = off
log_min_messages    = info
log_min_duration_statement = 250ms
log_line_prefix     = '%t [%p]: '
log_statement       = 'ddl'

# ---------- WAL + archiving ----------
wal_level         = replica
max_wal_senders   = 4
archive_mode      = on
archive_command   = 'pgbackrest --stanza=demo archive-push %p'
archive_timeout   = 60s

# ---------- autovacuum (faster for the demo) ----------
autovacuum_naptime = 30s
