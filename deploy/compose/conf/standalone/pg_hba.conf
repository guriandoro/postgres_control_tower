# PCT demo pg_hba.conf — DEMO ONLY.
#
# Trusts the compose internal network so the sibling pct-agent and the
# manager can probe pg_stat_archiver without managing a password. Do not
# copy this into a real deployment.

# TYPE  DATABASE  USER      ADDRESS         METHOD

# Local Unix socket (postgres user, replication tools, pgbackrest)
local   all       all                       trust
local   replication all                     trust

# Loopback
host    all       all       127.0.0.1/32    trust
host    all       all       ::1/128         trust

# Compose internal network (IPv4 only — bridge default).
host    all       all       0.0.0.0/0       trust
host    replication all     0.0.0.0/0       trust
