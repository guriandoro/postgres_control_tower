# pgBackRest config for the Patroni demo cluster.
#
# Both patroni-1 and patroni-2 mount the same `pgbr-ha-repo` volume, so
# the stanza name `ha-demo` resolves to the same repo on either node.

[global]
repo1-path=/var/lib/pgbackrest
repo1-retention-full=2
repo1-retention-diff=2
log-path=/var/log/pgbackrest
log-level-file=detail
log-level-console=info
process-max=2
start-fast=y
compress-type=zst
compress-level=3

[ha-demo]
pg1-path=/var/lib/postgresql/16/data
pg1-port=5432
pg1-socket-path=/var/run/postgresql
pg1-user=postgres
